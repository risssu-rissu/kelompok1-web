version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:4.4
    container_name: ids_mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ids_network

  # Node.js Backend API (port 5001)
  backend:
    build: ./backend
    container_name: ids_backend
    restart: unless-stopped
    ports:
      - "5041:5041"
    environment:
      - PORT=5041
      - MONGODB_URI=mongodb://mongodb:27017/student_management
      - JWT_SECRET=smkn1_siswa_jwt_secret_key_2026_secure
    depends_on:
      - mongodb
    networks:
      - ids_network

  # Frontend Static Server (port 5031)
  frontend:
    build: ./frontend
    container_name: ids_frontend
    restart: unless-stopped
    ports:
      - "5031:5031"
    environment:
      - PORT=5031
      - BACKEND_URL=http://backend:5041
    depends_on:
      - backend
    networks:
      - ids_network

volumes:
  mongodb_data:

networks:
  ids_network:
    driver: bridge
