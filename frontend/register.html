<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Daftar akun baru untuk Sistem Informasi Data Siswa">
    <title>Daftar Akun - Informasi Data Siswa</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Left: Form -->
            <div class="login-card-form">
                <div class="login-header">
                    <h1>Daftar Akun Baru</h1>
                    <p>Buat akun untuk mengakses sistem</p>
                </div>

                <form id="registerForm" class="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Masukkan username" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="nama@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Minimal 6 karakter" required>
                    </div>

                    <div class="error-message" id="errorMessage"></div>

                    <button type="submit" class="btn btn-primary btn-block">Daftar</button>
                </form>

                <div class="login-footer">
                    <p>Sudah punya akun? <a href="index.html">Login disini</a></p>
                </div>
            </div>

            <!-- Right: Illustration -->
            <div class="login-card-image" role="img" aria-label="School illustration"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/auth.js"></script>
</body>

</html>
